name: Rust-Fast PC Scraper 1

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install uv (The Rust-based package manager)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Speeds up future runs even more

      - name: Set up Python
        run: uv python install 3.12

      - name: Initialize venv
        # uv sync is faster than pip install
        run: uv venv

      - name: Install dependencies
        run: uv pip install polars supabase requests pytz playwright beautifulsoup4

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICEROLE: ${{ secrets.SERVICEROLE }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
        run: uv run scraper.py
